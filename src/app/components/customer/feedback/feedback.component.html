<div class="feedback-page">

  <div class="feedback-card">

    <h2 class="title">🚗 AutoCare Feedback</h2>

    <div *ngIf="submitted" class="success-msg">
      ✅ Thank you for your valuable feedback!
    </div>

    <form [formGroup]="feedbackForm" (ngSubmit)="submit()">

      <!-- Name -->
      <div class="input-box">
        <input type="text" formControlName="name" required>
        <label>Name</label>
      </div>

      <!-- Email -->
      <div class="input-box">
        <input type="email" formControlName="email" required>
        <label>Email</label>
      </div>

      <!-- Mobile -->
      <div class="input-box">
        <input type="tel" formControlName="mobile" required>
        <label>Mobile</label>
      </div>

      <!-- Ratings -->
      <div class="rating-box">
        <p>Product Quality</p>
        <div class="stars">
          <span *ngFor="let i of [1,2,3,4,5]" (click)="setRating('productQuality',i)"
          [class.active]="i<=feedbackForm.value.productQuality">★</span>
        </div>
      </div>

      <div class="rating-box">
        <p>Product Price</p>
        <div class="stars">
          <span *ngFor="let i of [1,2,3,4,5]" (click)="setRating('productPrice',i)"
          [class.active]="i<=feedbackForm.value.productPrice">★</span>
        </div>
      </div>

      <div class="rating-box">
        <p>Order Process</p>
        <div class="stars">
          <span *ngFor="let i of [1,2,3,4,5]" (click)="setRating('orderProcess',i)"
          [class.active]="i<=feedbackForm.value.orderProcess">★</span>
        </div>
      </div>

      <div class="rating-box">
        <p>Delivery Service</p>
        <div class="stars">
          <span *ngFor="let i of [1,2,3,4,5]" (click)="setRating('deliveryService',i)"
          [class.active]="i<=feedbackForm.value.deliveryService">★</span>
        </div>
      </div>

      <!-- Suggestion -->
      <div class="input-box">
        <textarea formControlName="suggestion" required></textarea>
        <label>Suggestions</label>
      </div>

      <!-- Button -->
      <button type="submit" [disabled]="submitting">
        Submit Feedback
      </button>

    </form>

  </div>

</div>
