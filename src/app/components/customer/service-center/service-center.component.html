<div class="container-fluid p-0">

  <div class="bg-danger py-3 px-4 border-bottom">
    <h4 class="mb-0">Service Centers</h4>
  </div>

  <div class="container mt-4">

    <div class="row">

      <div class="col-md-6 col-lg-4 mb-4" *ngFor="let sc of serviceCenters">

        <div class="card shadow border-0 h-100">

          <img 
            *ngIf="sc.image"
            [src]="sc.image"
            class="card-img-top"
            style="height:200px; object-fit:cover;"
          >

          <div class="card-body">

            <h5 class="fw-bold text-dark mb-2">
              {{ sc.serviceCenterName || sc.serviceCenterName }}
            </h5>

            <p class="mb-1">
              <b>Address:</b> {{ sc.address }}
            </p>

            <p class="mb-1">
              <b>Time:</b> {{ sc.serviceTime || sc.serviceTime }}
            </p>

            <p class="mb-1">
              <b>Service:</b> {{ sc.serviceType || sc.serviceType }}
            </p>

            <p class="mb-2">
              <b>Contact:</b> {{ sc.contactNumber || sc.contactNumber }}
            </p>

          </div>

          <div class="card-footer bg-white border-0">
            <button class="btn btn-danger w-100 btn-sm" 
        [routerLink]="['/customer/servicecenter_details', sc.id]">

              View Service
            </button>
          </div>

        </div>

      </div>

      <div *ngIf="serviceCenters.length === 0" class="text-center mt-5">
        <p class="text-muted">No Service Centers Found</p>
      </div>

    </div>

  </div>

</div>
