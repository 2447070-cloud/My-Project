<div class="card mx-auto mt-5" style="width: 400px ;">
 <div class="card-body">
    <div class="card-title text-center mb-4">Register</div>

    <div *ngIf="error" class="alert alert-danger">{{error}}</div>

    <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" name="" id="name" [(ngModel)]="customer.name" class="form-control">
    </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="" id="email" [(ngModel)]="customer.email" class="form-control">
    </div>
      <div class="mb-3">
        <label class="form-label">Contact</label>
        <input type="number" name="" id="contact" [(ngModel)]="customer.contact" class="form-control">
    </div>
      <div class="mb-3">
        <label class="form-label">Address</label>
        <input type="text" name="" id="address" [(ngModel)]="customer.address" class="form-control">
    </div>
      <div class="mb-3">
        <label class="form-label">City</label>
        <input type="text" name="" id="city" [(ngModel)]="customer.city" class="form-control">
    </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="" id="password" [(ngModel)]="customer.password" class="form-control">
    </div>

    <button class="btn btn-success w-100" (click)="save()">Register</button>

    <p class="text-center mt-3">
        Already have an account? <a>Login</a>
    </p>
 </div>
</div>
