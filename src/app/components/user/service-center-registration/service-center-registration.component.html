<div class="page">

  <div class="card form-card shadow">

    <h3 class="text-center mb-4">Service Center Registration</h3>

    <!-- SUCCESS -->
    <div *ngIf="success" class="alert alert-success">
      {{ success }}
    </div>

    <!-- ERROR -->
    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" #f="ngForm">

      <!-- CONTACT -->
      <div class="mb-3">
        <label class="form-label">Contact Number</label>
        <input type="text" class="form-control"
          [(ngModel)]="service.contactNumber"
          name="contactNumber" required>
      </div>

      <!-- ADDRESS -->
      <div class="mb-3">
        <label class="form-label">Address</label>
        <input type="text" class="form-control"
          [(ngModel)]="service.address"
          name="address" required>
      </div>

      <!-- NAME -->
      <div class="mb-3">
        <label class="form-label">Service Center Name</label>
        <input type="text" class="form-control"
          [(ngModel)]="service.serviceCenterName"
          name="serviceCenterName" required>
      </div>

      <!-- EMAIL -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control"
          [(ngModel)]="service.email"
          name="email" required>
      </div>

      <!-- PASSWORD -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control"
          [(ngModel)]="service.password"
          name="password" required>
      </div>

      <!-- LOCATION -->
      <div class="mb-3">
        <label class="form-label">Location</label>
        <select class="form-select"
          [(ngModel)]="service.location"
          name="location" required>
          <option value="">Select Location</option>
          <option value="Pune">Pune</option>
          <option value="Mumbai">Mumbai</option>
          <option value="Nashik">Nashik</option>
        </select>
      </div>

      <!-- SERVICE TIME -->
      <div class="mb-3">
        <label class="form-label">Service Time</label>
        <input type="text" class="form-control"
          [(ngModel)]="service.serviceTime"
          name="serviceTime"
          placeholder="9AM - 6PM" required>
      </div>

      <!-- SERVICE TYPE -->
      <div class="mb-3">
        <label class="form-label">Service Type</label>
        <input type="text" class="form-control"
          [(ngModel)]="service.serviceType"
          name="serviceType"
          placeholder="Car / Bike / Washing" required>
      </div>
      

      <!-- IMAGE -->
      <div class="mb-3">
        <label class="form-label">Upload Image</label>
        <input type="file"
          class="form-control"
          (change)="onImageSelected($event)">
      </div>
      
      <div class="col-md-6 mb-3" *ngIf="imgPreview">
      <label>Preview</label><br>
      <img [src]="imgPreview" class="img-thumbnail" style="width: 120px;">
    </div>

      <!-- BUTTON -->
      <button type="submit"
        class="btn btn-primary w-100"
        [disabled]="f.invalid">
        Register
      </button>

    </form>

    <!-- LOGIN LINK -->
    <p class="text-center mt-3">
      Already registered?
      <a routerLink="/service-login">Login here</a>
    </p>

  </div>

</div>
