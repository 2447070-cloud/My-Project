<div class="page">

  <div class="card mx-auto shadow login-card">
    <div class="card-body">

      <h3 class="text-center mb-4">Customer Login</h3>

      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>

      <form (ngSubmit)="login()" #loginForm="ngForm">

        <!-- EMAIL -->
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input 
            type="email"
            class="form-control"
            [(ngModel)]="loginRequest.email"
            name="email"
            required
            autocomplete="email"
          />
        </div>

        <!-- PASSWORD -->
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input 
            type="password"
            class="form-control"
            [(ngModel)]="loginRequest.password"
            name="password"
            required
            autocomplete="current-password"
          />
        </div>

        <!-- BUTTON -->
        <button 
          type="submit" 
          class="btn btn-primary w-100"
          [disabled]="loginForm.invalid"
        >
          Login
        </button>

      </form>

      <p class="text-center mt-3">
        Don't have an account?
        <a routerLink="/signUp">Register</a>
      </p>

    </div>
  </div>

</div>
