<h2>
    Category Management
</h2>

<div class="card p-3 shadow-sm mb-4">
    <h4>{{ isEdit ? 'Edit Category' : 'Add New Category' }}</h4>

    <div class="alert alert-success" *ngIf="success">{{success}}</div>
    <div class="alert alert-danger" *ngIf="error">{{error}}</div>

    <div class="row mt-3">
        <div class="col-md-6 mb-3">
            <label for="categoryName" class="form-label">Category Name</label>
            <input type="text" class="form-control" [(ngModel)]="newCategory.categoryname" id="categoryName">
        </div>
        <div class="col-md-6 mb-3">
            <label for="Name" class="form-label">Image</label>
            <input type="file" class="form-control" (change)="onImageSelected($event)">
        </div>
        <div class="col-md-6 mb-3">
            <label>Preview</label><br>
            <img [src]="imgPreview" class="img-thumbnail" style="width: 120px;">
        </div>

        <div class="col-12 mt-2">
            <button class="btn btn-primary" *ngIf="!isEdit" (click)="saveCategory()">Save</button>
            <button class="btn btn-success" *ngIf="isEdit" (click)="updateCategory()">Update</button>
            <button class="btn btn-secondary" (click)="resetForm()">Clear</button>
        </div>
    </div>
</div>

<table class="table table-borderes shadow-sm">
  <thead>
    <tr>
        <th>SrNo</th>
        <th>Name</th>
        <th>Image</th>
        <th>Action</th>
    </tr>
  </thead>
  <tbody>
     <tr *ngFor="let c of categories; let srNo =index">
        <td>{{srNo+1}}</td>
        <td>{{c.categoryname}}</td>
        <td>
            <img [src]="c.imageURL" class="img-thumbnail" style="width: 70px;height: 70px;">
        </td>
        <td>
            <button class="btn btn-sm btn-warning" (click)="editCategory(c)">Edit</button>
            <button class="btn btn-sm btn-danger" (click)="deleteCategory(c.categoryid!)">Delete</button>
        </td>
     </tr>
  </tbody>
</table>
